apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: argocd-alerts
  namespace: monitoring
  labels:
    release: prometheus
spec:
  groups:
    - name: argocd.application.health
      interval: 30s
      rules:
        - alert: ArgoCDAppNotHealthy
          expr: |
            argocd_app_info{health_status!~"Healthy|Progressing"} == 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "App {{ $labels.name }} is not healthy"
            description: >
              Application {{ $labels.name }} in project {{ $labels.project }}
              has been in {{ $labels.health_status }} state for more than 5 minutes.

        - alert: ArgoCDAppUnknownHealth
          expr: |
            argocd_app_info{health_status="Unknown"} == 1
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: "App {{ $labels.name }} health is Unknown"
            description: >
              Application {{ $labels.name }} has been in Unknown health state
              for more than 10 minutes.

    - name: argocd.application.sync
      interval: 30s
      rules:
        - alert: ArgoCDAppOutOfSync
          expr: |
            argocd_app_info{sync_status="OutOfSync"} == 1
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "App {{ $labels.name }} is OutOfSync"
            description: >
              Application {{ $labels.name }} has been OutOfSync for more than 10 minutes.

        - alert: ArgoCDSyncFailed
          expr: |
            argocd_app_info{operation_phase="Failed"} == 1
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Sync failed for {{ $labels.name }}"
            description: >
              The last sync operation for {{ $labels.name }} failed.

    - name: argocd.controller.performance
      interval: 60s
      rules:
        - alert: ArgoCDHighReconciliationLatency
          expr: |
            histogram_quantile(0.95,
              rate(argocd_app_reconcile_bucket[5m])
            ) > 10
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Argo CD reconciliation latency is high"
            description: >
              p95 reconciliation latency has been above 10s for 5 minutes.

    - name: argocd.components
      interval: 30s
      rules:
        - alert: ArgoCDServerDown
          expr: |
            absent(up{job="argocd-server"}) == 1
              or
            up{job="argocd-server"} == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Argo CD server is down"
            description: >
              argocd-server has not been scraped successfully for 2 minutes.

        - alert: ArgoCDApplicationControllerDown
          expr: |
            absent(up{job="argocd-application-controller"}) == 1
              or
            up{job="argocd-application-controller"} == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Argo CD application controller is down"
            description: >
              argocd-application-controller has not been scraped for 2 minutes.
              GitOps reconciliation is not occurring.

        - alert: ArgoCDRepoServerDown
          expr: |
            absent(up{job="argocd-repo-server"}) == 1
              or
            up{job="argocd-repo-server"} == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Argo CD repo-server is down"
            description: >
              argocd-repo-server has not been scraped for 2 minutes.
              Argo CD cannot render manifests or check Git repositories.
