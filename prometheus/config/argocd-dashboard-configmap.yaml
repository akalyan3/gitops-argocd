apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-grafana-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  argocd-dashboard.json: |
    {
      "title": "Argo CD",
      "uid": "argocd-main",
      "tags": ["argocd", "gitops"],
      "refresh": "30s",
      "schemaVersion": 38,
      "time": { "from": "now-3h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "hide": 0,
            "refresh": 1
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "Applications Overview",
          "type": "row",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 }
        },
        {
          "id": 2,
          "title": "Apps OutOfSync",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 0, "y": 1 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "options": {
            "colorMode": "background",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "red", "value": 5 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "count(argocd_app_info{sync_status=\"OutOfSync\"}) or vector(0)",
              "legendFormat": "OutOfSync",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "title": "Apps Degraded",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 4, "y": 1 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "options": {
            "colorMode": "background",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 1 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "count(argocd_app_info{health_status=\"Degraded\"}) or vector(0)",
              "legendFormat": "Degraded",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "title": "Total Applications",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 8, "y": 1 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "options": {
            "colorMode": "value",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "targets": [
            {
              "expr": "count(argocd_app_info) or vector(0)",
              "legendFormat": "Total",
              "refId": "A"
            }
          ]
        },
        {
          "id": 10,
          "title": "Controller Performance",
          "type": "row",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 5 }
        },
        {
          "id": 11,
          "title": "Reconciliation Latency (p50/p95/p99)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 6 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "unit": "s" } },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, rate(argocd_app_reconcile_bucket[5m]))",
              "legendFormat": "p50",
              "refId": "A"
            },
            {
              "expr": "histogram_quantile(0.95, rate(argocd_app_reconcile_bucket[5m]))",
              "legendFormat": "p95",
              "refId": "B"
            },
            {
              "expr": "histogram_quantile(0.99, rate(argocd_app_reconcile_bucket[5m]))",
              "legendFormat": "p99",
              "refId": "C"
            }
          ]
        },
        {
          "id": 12,
          "title": "Gi
